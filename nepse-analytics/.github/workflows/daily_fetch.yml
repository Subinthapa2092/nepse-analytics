name: Daily NEPSE Fetch

on:
  schedule:
    # 10:30 UTC = 4:15 PM Nepal time, Mon-Fri (NEPSE trading days)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:   # allows manual trigger from the Actions tab for testing

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily price fetch
        run: python scraper/fetch_prices.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
